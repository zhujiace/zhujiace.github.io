<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Academic homepage of Jiace Zhu, Ph.D. student at Shanghai Jiao Tong University.">
    <title>Jiace Zhu | Academic Homepage</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #202124;
        --muted: #5f6368;
        --line: #d9dde3;
        --soft: #f6f7f9;
        --paper: #ffffff;
        --accent: #0b5cad;
        --accent-dark: #083f76;
        --warm: #a24f1f;
        --max: 980px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Noto Sans", sans-serif;
        font-size: 16px;
        line-height: 1.65;
      }

      a { color: var(--accent); text-decoration: none; }
      a:hover { color: var(--accent-dark); text-decoration: underline; }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(12px);
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        max-width: var(--max);
        margin: 0 auto;
        padding: 14px 24px;
      }

      .brand { color: var(--ink); font-weight: 700; letter-spacing: 0; }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        font-size: 14px;
      }

      .nav-links a { color: var(--muted); }

      main {
        max-width: var(--max);
        margin: 0 auto;
        padding: 0 24px 56px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        gap: 48px;
        align-items: center;
        padding: 58px 0 42px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--warm);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1, h2, h3, p { margin-top: 0; }
      h1 { margin-bottom: 14px; font-size: 42px; line-height: 1.15; letter-spacing: 0; }
      h1 span { color: var(--muted); font-weight: 600; }
      h2 { margin-bottom: 18px; font-size: 24px; line-height: 1.25; }
      h3 { margin-bottom: 8px; font-size: 17px; }

      .lead {
        max-width: 760px;
        color: #34383d;
        font-size: 18px;
      }

      .portrait {
        width: 300px;
        max-width: 100%;
        height: auto;
        border: 1px solid var(--line);
        display: block;
        background: var(--soft);
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 7px 13px;
        border: 1px solid var(--line);
        color: var(--ink);
        background: var(--paper);
        font-size: 14px;
        font-weight: 600;
      }

      .button.primary {
        border-color: var(--accent);
        color: #fff;
        background: var(--accent);
      }

      .button:hover {
        text-decoration: none;
        border-color: var(--accent);
      }

      section {
        padding: 34px 0;
        border-bottom: 1px solid var(--line);
      }

      .section-grid {
        display: grid;
        grid-template-columns: 200px minmax(0, 1fr);
        gap: 34px;
      }

      .section-kicker {
        color: var(--muted);
        font-size: 14px;
      }

      .entry-list, .pub-list, .plain-list {
        display: grid;
        gap: 18px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .entry-list + h2 { margin-top: 30px; }

      .entry {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        padding-bottom: 18px;
        border-bottom: 1px solid #eceff3;
      }

      .entry:last-child { padding-bottom: 0; border-bottom: 0; }
      .entry-title { margin: 0 0 3px; font-weight: 700; line-height: 1.35; }
      .entry-meta { margin: 0; color: var(--muted); font-size: 14px; }
      .entry-time { color: var(--muted); font-size: 14px; white-space: nowrap; }

      .publication {
        padding-bottom: 18px;
        border-bottom: 1px solid #eceff3;
      }

      .publication:last-child { padding-bottom: 0; border-bottom: 0; }

      .pub-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: start;
      }

      .pub-title {
        margin-bottom: 4px;
        font-size: 17px;
        font-weight: 700;
        line-height: 1.35;
      }

      .authors { margin-bottom: 3px; color: #3b3f44; }
      .authors strong { font-weight: 800; }
      .venue { margin-bottom: 8px; color: var(--muted); font-size: 14px; }

      .pub-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pub-links a {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        border: 1px solid var(--line);
        padding: 3px 10px;
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 700;
      }

      .pub-links a:hover {
        border-color: var(--accent);
        text-decoration: none;
      }

      .paper-toggle {
        min-height: 30px;
        border: 1px solid var(--line);
        padding: 3px 10px;
        color: var(--accent-dark);
        background: var(--paper);
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .paper-toggle:hover,
      .paper-toggle[aria-expanded="true"] {
        border-color: var(--accent);
      }

      .paper-panel {
        display: none;
        grid-template-columns: 1fr;
        gap: 18px;
        margin-top: 14px;
        padding: 16px;
        border: 1px solid #eceff3;
        background: var(--soft);
      }

      .paper-panel.is-open { display: grid; }
      .paper-panel h3 { margin-bottom: 6px; font-size: 15px; }
      .paper-panel p { margin-bottom: 10px; }
      .paper-panel ul { margin: 0; padding-left: 18px; }

      .figure-card { display: grid; gap: 10px; }

      .paper-figure {
        width: 100%;
        height: 420px;
        border: 1px solid var(--line);
        object-fit: contain;
        background: var(--paper);
      }

      img.paper-figure {
        display: block;
        padding: 8px;
      }

      .plain-list li {
        position: relative;
        padding-left: 16px;
      }

      .plain-list li::before {
        position: absolute;
        left: 0;
        top: 0.72em;
        width: 6px;
        height: 6px;
        background: var(--accent);
        content: "";
      }

      .site-footer {
        max-width: var(--max);
        margin: 0 auto;
        padding: 24px;
        color: var(--muted);
        font-size: 14px;
      }

      .footer-links { margin: 0 0 6px; }
      .footer-note { margin: 0; }

      @media (max-width: 760px) {
        .nav {
          align-items: flex-start;
          flex-direction: column;
          gap: 8px;
        }

        .hero,
        .section-grid,
        .paper-panel {
          grid-template-columns: 1fr;
        }

        .hero {
          gap: 26px;
          padding-top: 36px;
        }

        h1 { font-size: 34px; }
        .portrait { width: min(260px, 100%); }
        .pub-row, .entry { grid-template-columns: 1fr; }
        .paper-toggle { justify-self: start; }
        .paper-figure { height: 280px; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="nav">
        <a class="brand" href="#top" id="brand"></a>
        <nav class="nav-links" id="nav-links" aria-label="Primary navigation"></nav>
      </div>
    </header>

    <main id="top">
      <section class="hero" id="hero" aria-labelledby="page-title"></section>
      <section id="about" aria-labelledby="about-title"></section>
      <section id="publications" aria-labelledby="publications-title"></section>
      <section id="honors" aria-labelledby="honors-title"></section>
      <section id="misc" aria-labelledby="misc-title"></section>
    </main>

    <footer class="site-footer">
      <p class="footer-links" id="footer-links"></p>
      <p class="footer-note" id="footer-note"></p>
    </footer>

    <script src="data/site.js"></script>
    <script>
      const el = (tag, className, text) => {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined) node.textContent = text;
        return node;
      };

      const link = (item, className) => {
        const node = el("a", className, item.label);
        node.href = item.href;
        return node;
      };

      const renderSectionShell = (section, titleId) => {
        const grid = el("div", "section-grid");
        const aside = el("div");
        aside.append(el("p", "eyebrow", section.eyebrow), el("p", "section-kicker", section.kicker));
        const content = el("div");
        const title = el("h2", "", section.title || section.educationTitle);
        title.id = titleId;
        content.append(title);
        grid.append(aside, content);
        return { grid, content };
      };

      const renderEntries = (items) => {
        const list = el("ul", "entry-list");
        items.forEach((item) => {
          const li = el("li", "entry");
          const text = el("div");
          text.append(el("p", "entry-title", item.title));
          item.meta.forEach((line) => text.append(el("p", "entry-meta", line)));
          li.append(text, el("span", "entry-time", item.time));
          list.append(li);
        });
        return list;
      };

      const renderAuthors = (authors) => {
        const container = el("div", "authors");
        authors.forEach((author, index) => {
          if (index > 0) container.append(document.createTextNode(index === authors.length - 1 ? ", and " : ", "));
          container.append(author.self ? el("strong", "", author.name) : document.createTextNode(author.name));
        });
        return container;
      };

      const renderFigure = (figure) => {
        const card = el("div", "figure-card");
        if (figure.type === "image") {
          const image = el("img", "paper-figure");
          image.src = figure.src;
          image.alt = figure.alt;
          card.append(image);
        } else {
          const object = el("object", "paper-figure");
          object.data = figure.src;
          object.type = "application/pdf";
          object.setAttribute("aria-label", figure.alt);
          card.append(object);
        }
        return card;
      };

      const wirePaperToggles = (labels) => {
        document.querySelectorAll(".paper-toggle").forEach((button) => {
          button.addEventListener("click", () => {
            const panel = document.getElementById(button.getAttribute("aria-controls"));
            const isOpen = button.getAttribute("aria-expanded") === "true";
            button.setAttribute("aria-expanded", String(!isOpen));
            button.textContent = isOpen ? labels.detailsLabel : labels.hideLabel;
            panel.classList.toggle("is-open", !isOpen);
          });
        });
      };

      const renderSite = (data) => {
        document.title = data.site.title;
        document.querySelector("meta[name='description']").setAttribute("content", data.site.description);
        document.getElementById("brand").textContent = data.site.brand;

        const nav = document.getElementById("nav-links");
        data.site.nav.forEach((item) => nav.append(link(item)));

        const hero = document.getElementById("hero");
        const heroText = el("div");
        heroText.append(el("p", "eyebrow", data.profile.eyebrow));
        const name = el("h1");
        name.id = "page-title";
        name.append(document.createTextNode(`${data.profile.name} `));
        const chineseName = el("span", "", data.profile.chineseName);
        chineseName.lang = "zh-Hans";
        name.append(chineseName);
        heroText.append(name);
        data.profile.bio.forEach((line) => heroText.append(el("p", "lead", line)));
        const profileLinks = el("div", "links");
        profileLinks.setAttribute("aria-label", "Profile links");
        data.profile.links.forEach((item) => profileLinks.append(link(item, item.primary ? "button primary" : "button")));
        heroText.append(profileLinks);
        const portrait = el("img", "portrait");
        portrait.src = data.profile.portrait.src;
        portrait.alt = data.profile.portrait.alt;
        hero.append(heroText, portrait);

        const about = renderSectionShell(data.about, "about-title");
        about.content.append(renderEntries(data.about.education));
        about.content.append(el("h2", "", data.about.internshipTitle));
        about.content.append(renderEntries(data.about.internships));
        document.getElementById("about").append(about.grid);

        const pubs = renderSectionShell(data.publications, "publications-title");
        const pubList = el("ul", "pub-list");
        data.publications.items.forEach((paper) => {
          const item = el("li", "publication");
          const row = el("div", "pub-row");
          const summary = el("div");
          summary.append(el("div", "pub-title", paper.title), renderAuthors(paper.authors), el("div", "venue", paper.venue));
          const links = el("div", "pub-links");
          paper.links.forEach((paperLink) => links.append(link(paperLink)));
          summary.append(links);
          const button = el("button", "paper-toggle", data.publications.detailsLabel);
          button.type = "button";
          button.setAttribute("aria-expanded", "false");
          button.setAttribute("aria-controls", `paper-${paper.id}`);
          row.append(summary, button);

          const panel = el("div", "paper-panel");
          panel.id = `paper-${paper.id}`;
          const detailText = el("div");
          detailText.append(el("h3", "", paper.detail.heading), el("p", "", paper.detail.summary));
          const points = el("ul");
          paper.detail.points.forEach((point) => points.append(el("li", "", point)));
          detailText.append(points);
          panel.append(detailText, renderFigure(paper.detail.figure));
          item.append(row, panel);
          pubList.append(item);
        });
        pubs.content.append(pubList);
        document.getElementById("publications").append(pubs.grid);

        ["honors", "misc"].forEach((key) => {
          const section = renderSectionShell(data[key], `${key}-title`);
          const list = el("ul", "plain-list");
          data[key].items.forEach((item) => list.append(el("li", "", item)));
          section.content.append(list);
          document.getElementById(key).append(section.grid);
        });

        const footerLinks = document.getElementById("footer-links");
        data.footerLinks.forEach((item, index) => {
          if (index > 0) footerLinks.append(document.createTextNode(" | "));
          footerLinks.append(link(item));
        });
        document.getElementById("footer-note").textContent = data.site.footerNote;

        wirePaperToggles(data.publications);
      };

      if (window.SITE_DATA) {
        renderSite(window.SITE_DATA);
      } else {
        document.getElementById("hero").textContent = "Unable to load site data.";
      }
    </script>
  </body>
</html>
